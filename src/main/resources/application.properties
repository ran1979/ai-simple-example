spring.application.name=ai
server.port=8080
# AI/MCP configuration
# Use STREAMABLE protocol to allow standalone HTTP/SSE client connections
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.name=custom-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.annotation-scanner.enabled=true
# Elicitation forms need human input time; default 20s is too short
spring.ai.mcp.server.request-timeout=120s

# Use STDIO transport
#spring.ai.mcp.server.stdio=true
# CRITICAL: Disable the Banner and Web Server
# Any text printed to console will break the connection
#spring.main.banner-mode=off
#spring.main.web-application-type=none

# HTTP/SSE logs
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=TRACE
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE

logging.level.io.modelcontextprotocol=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
